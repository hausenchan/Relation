<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>幂动组织中台</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC',
          'Noto Sans SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #f0f2f5;
      }

      /* ── Scrollbar ──────────────────────────────── */
      .menu-scroll-container::-webkit-scrollbar {
        width: 4px;
      }
      .menu-scroll-container::-webkit-scrollbar-track {
        background: transparent;
      }
      .menu-scroll-container::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 4px;
      }
      .menu-scroll-container::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      /* ── Sidebar search ─────────────────────────── */
      .sider-search .ant-input {
        background: transparent !important;
        color: #fff !important;
      }
      .sider-search .ant-input::placeholder {
        color: rgba(255, 255, 255, 0.35) !important;
      }
      .sider-search .ant-input-clear-icon {
        color: rgba(255, 255, 255, 0.4) !important;
      }
      .sider-search .ant-input-affix-wrapper {
        background: rgba(255, 255, 255, 0.06) !important;
        border-color: rgba(255, 255, 255, 0.08) !important;
        transition: all 0.2s ease !important;
      }
      .sider-search .ant-input-affix-wrapper:focus-within {
        background: rgba(255, 255, 255, 0.1) !important;
        border-color: rgba(79, 70, 229, 0.5) !important;
      }

      /* ── Sidebar menu refinements ───────────────── */
      .ant-layout-sider .ant-menu-dark .ant-menu-item {
        transition: all 0.2s ease !important;
        margin: 2px 8px !important;
        border-radius: 8px !important;
      }
      .ant-layout-sider .ant-menu-dark .ant-menu-submenu-title {
        margin: 2px 8px !important;
        border-radius: 8px !important;
        transition: all 0.2s ease !important;
      }

      /* ── Stat card hover lift ───────────────────── */
      .stat-card {
        transition: transform 0.2s ease, box-shadow 0.2s ease !important;
      }
      .stat-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15) !important;
      }

      /* ── Notification bell fix ──────────────────── */
      .ant-layout-header .ant-badge .anticon-bell {
        color: #6b7280 !important;
      }
      .ant-layout-header .ant-badge .anticon-bell:hover {
        color: #374151 !important;
      }

      /* ── Selection color ────────────────────────── */
      ::selection {
        background: rgba(79, 70, 229, 0.2);
        color: inherit;
      }

      /* ── Sidebar full height fix ────────────────── */
      .ant-layout {
        min-height: 100vh;
      }
      .ant-layout .ant-layout-sider {
        min-height: 100vh;
        background: #0f0f23 !important;
      }
    </style>
  </head>
  <body>
    <script>
      // 在所有 bundle 之前拦截腾讯地图 SDK 产生的跨域 "Script error."
      window.addEventListener('error', function(e) {
        if (!e.error && e.message === 'Script error.') {
          e.stopImmediatePropagation();
          e.preventDefault();
          return true;
        }
      }, true);
    </script>
    <noscript>请启用 JavaScript 以运行此应用。</noscript>
    <div id="root"></div>
  </body>
</html>
