<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <title>幂动组织中台</title>
    <style>
      .menu-scroll-container::-webkit-scrollbar {
        width: 8px;
      }
      .menu-scroll-container::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 4px;
      }
      .menu-scroll-container::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.3);
        border-radius: 4px;
      }
      .menu-scroll-container::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.5);
      }
      /* 侧边栏搜索框样式 */
      .sider-search .ant-input {
        background: transparent !important;
        color: #fff !important;
      }
      .sider-search .ant-input::placeholder {
        color: rgba(255, 255, 255, 0.35) !important;
      }
      .sider-search .ant-input-clear-icon {
        color: rgba(255, 255, 255, 0.4) !important;
      }
      .sider-search .ant-input-affix-wrapper {
        background: rgba(255, 255, 255, 0.08) !important;
        border-color: rgba(255, 255, 255, 0.12) !important;
      }
    </style>
  </head>
  <body>
    <noscript>请启用 JavaScript 以运行此应用。</noscript>
    <div id="root"></div>
  </body>
</html>
